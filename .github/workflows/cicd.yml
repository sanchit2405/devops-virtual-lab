name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t devops-lab-app ./app

      - name: Simulate Kubernetes Deploy
        run: |
          echo "Applying Kubernetes manifests..."
          echo "kubectl apply -f k8s/deployment.yml"
          echo "kubectl apply -f k8s/service.yml"
          echo "Deployment simulation complete!"

      - name: Pipeline Summary
        run: |
          echo "==============================="
          echo " DevOps CI/CD Pipeline Done!"
          echo " Git -> Actions -> Docker -> K8s"
          echo "==============================="